<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimizador de Prompts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              abyss: "#07111f",
              panel: "#0c1729",
              panelSoft: "#101d33",
              line: "#23324b",
              cyan: "#65e6ff",
              aqua: "#1fb6ff",
              teal: "#34d399",
              coral: "#ff8f70",
              snow: "#f8fbff",
              mist: "#8ba3c7"
            },
            fontFamily: {
              display: ["Sora", "sans-serif"],
              sans: ["Manrope", "sans-serif"]
            },
            boxShadow: {
              glow: "0 30px 90px rgba(4, 12, 24, 0.45)",
              neon: "0 0 0 1px rgba(101, 230, 255, 0.12), 0 20px 60px rgba(31, 182, 255, 0.2)"
            }
          }
        }
      };
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        background:
          radial-gradient(circle at 15% 20%, rgba(31, 182, 255, 0.22), transparent 28%),
          radial-gradient(circle at 85% 18%, rgba(52, 211, 153, 0.18), transparent 24%),
          radial-gradient(circle at 50% 100%, rgba(255, 143, 112, 0.15), transparent 24%),
          linear-gradient(180deg, #07111f 0%, #050b16 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(139, 163, 199, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(139, 163, 199, 0.05) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent 92%);
        opacity: 0.16;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 20% 16%, rgba(255, 255, 255, 0.1), transparent 24%),
          radial-gradient(circle at 82% 12%, rgba(101, 230, 255, 0.16), transparent 20%),
          radial-gradient(circle at 50% 48%, rgba(255, 255, 255, 0.04), transparent 32%);
        mix-blend-mode: screen;
        opacity: 0.22;
      }

      .glass-panel {
        position: relative;
        isolation: isolate;
        background:
          linear-gradient(180deg, rgba(16, 29, 51, 0.8), rgba(7, 17, 31, 0.92)),
          radial-gradient(circle at top left, rgba(101, 230, 255, 0.05), transparent 40%);
        backdrop-filter: blur(14px) saturate(118%);
        box-shadow:
          0 24px 64px rgba(4, 12, 24, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .glass-panel::before,
      .glass-card::before,
      .glass-chip::before,
      .glass-input::before,
      .glass-menu::before,
      .hero-gradient::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: inherit;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0) 36%);
        opacity: 0.8;
        z-index: 0;
      }

      .glass-panel > *,
      .glass-card > *,
      .glass-chip > *,
      .glass-input > *,
      .glass-menu > *,
      .hero-gradient > * {
        position: relative;
        z-index: 1;
      }

      .glass-card {
        position: relative;
        isolation: isolate;
        background:
          linear-gradient(180deg, rgba(17, 29, 49, 0.84), rgba(9, 17, 30, 0.94)),
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.03), transparent 42%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 14px 34px rgba(4, 12, 24, 0.18);
      }

      .glass-chip {
        position: relative;
        isolation: isolate;
        background: rgba(12, 23, 41, 0.62);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.09),
          0 8px 20px rgba(4, 12, 24, 0.14);
      }

      .glass-input {
        position: relative;
        isolation: isolate;
        background:
          linear-gradient(180deg, rgba(8, 16, 30, 0.9), rgba(7, 17, 31, 0.96)),
          radial-gradient(circle at top left, rgba(101, 230, 255, 0.04), transparent 34%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 12px 28px rgba(4, 12, 24, 0.16);
      }

      .glass-menu {
        position: relative;
        isolation: isolate;
        background:
          linear-gradient(180deg, rgba(12, 23, 41, 0.9), rgba(8, 16, 30, 0.96)),
          radial-gradient(circle at top right, rgba(101, 230, 255, 0.08), transparent 34%);
        backdrop-filter: blur(18px) saturate(120%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 18px 42px rgba(4, 12, 24, 0.26);
      }

      .hero-gradient {
        position: relative;
        isolation: isolate;
        background:
          linear-gradient(135deg, rgba(101, 230, 255, 0.14), rgba(52, 211, 153, 0.08)),
          linear-gradient(180deg, rgba(13, 24, 42, 0.84), rgba(7, 14, 26, 0.94)),
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.06), transparent 26%);
        backdrop-filter: blur(16px) saturate(118%);
        box-shadow:
          0 24px 68px rgba(4, 12, 24, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body class="min-h-screen bg-abyss text-snow antialiased">
    <div id="root"></div>
    <script type="module" src="/static/app.js?v=20260504-subscriber-dashboard"></script>
  </body>
</html>
